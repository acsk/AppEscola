services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: appEscola_php
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - appescola
    depends_on:
      - db

  nginx:
    image: nginx:1.25-alpine
    container_name: appEscola_nginx
    restart: unless-stopped
    ports:
      - "4000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - appescola
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: appEscola_mysql
    restart: unless-stopped
    ports:
      - "4006:3306"
    environment:
      MYSQL_DATABASE: appescola
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: appescola
      MYSQL_PASSWORD: appescola
    volumes:
      - appescola_mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - appescola

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: appEscola_phpmyadmin
    restart: unless-stopped
    ports:
      - "4008:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    networks:
      - appescola
    depends_on:
      - db

networks:
  appescola:
    driver: bridge

volumes:
  appescola_mysql_data:
    driver: local
